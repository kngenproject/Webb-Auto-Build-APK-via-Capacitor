<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>APK Builder Pro</title>

<!-- PWA Meta Tags -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APK Builder">
<link rel="apple-touch-icon" href="icon/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon/icon-512.png">

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
  min-height: 100vh;
}
.container {
  max-width: 500px;
  margin: 50px auto;
  padding: 20px;
}
.card {
  background: rgba(30, 41, 59, 0.9);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
h1 {
  text-align: center;
  margin-bottom: 5px;
}
.subtitle {
  text-align: center;
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 20px;
}
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}
.upload {
  background: #22c55e;
  color: black;
}
.upload:hover {
  background: #16a34a;
}
.download {
  background: #3b82f6;
}
.download:hover {
  background: #2563eb;
}
.status {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  background: #020617;
  font-size: 13px;
}
.loader {
  display: none;
  margin-top: 10px;
  text-align: center;
}
.loader div {
  width: 10px;
  height: 10px;
  margin: 3px;
  background: #22c55e;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1.2s infinite ease-in-out;
}
.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}
.footer {
  text-align: center;
  font-size: 12px;
  color: #64748b;
  margin-top: 20px;
}
.install-btn {
  background: #8b5cf6;
  margin-top: 10px;
  display: none;
}
.install-btn.show {
  display: block;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>🚀 APK Builder</h1>
    <div class="subtitle">Upload project ZIP → Build APK via GitHub Actions</div>
    
    <input type="file" id="zipFile" accept=".zip">
    <input type="text" id="repo" placeholder="username/repo (target APK)">
    
    <button class="upload" onclick="upload()">Upload & Build</button>
    <button class="download" onclick="getApk()">Download APK</button>
    
    <button id="installBtn" class="install-btn" onclick="installPWA()">📱 Install Aplikasi</button>
    
    <div class="loader" id="loader">
      <div></div><div></div><div></div>
    </div>
    <div class="status" id="status">Status: idle</div>
  </div>
  <div class="footer">APK Builder Pro • PWA Ready ⚡</div>
</div>

<script>
// Konfigurasi backend (ganti dengan URL backend Anda jika deploy)
const BACKEND_URL = 'http://localhost:3000';

// PWA Installation
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').classList.add('show');
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((result) => {
      if (result.outcome === 'accepted') {
        console.log('PWA installed');
      }
      deferredPrompt = null;
      document.getElementById('installBtn').classList.remove('show');
    });
  }
}

// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('Service Worker registered', reg);
    }).catch(err => {
      console.log('SW registration failed', err);
    });
  });
}

// Upload function
async function upload() {
  const file = document.getElementById('zipFile').files[0];
  const repo = document.getElementById('repo').value;
  if (!file || !repo) {
    alert("Isi semua field dulu!");
    return;
  }
  document.getElementById("loader").style.display = "block";
  document.getElementById("status").textContent = "⏳ Mengupload ZIP...";
  const formData = new FormData();
  formData.append("zip", file);
  formData.append("repo", repo);
  try {
    const res = await fetch(`${BACKEND_URL}/upload`, {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById("status").textContent = data.message;
    } else {
      document.getElementById("status").textContent = "❌ Error: " + (data.error || "unknown");
    }
  } catch (e) {
    document.getElementById("status").textContent = "❌ Gagal koneksi ke backend";
  }
  document.getElementById("loader").style.display = "none";
}

// Download function
function getApk() {
  const repo = document.getElementById("repo").value;
  if (!repo) {
    alert("Isi repo dulu!");
    return;
  }
  window.open(`${BACKEND_URL}/latest-apk?repo=${repo}`, "_blank");
}
</script>
</body>
</html>
