<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>APK Builder Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#eef2ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="APK Builder">
<link rel="apple-touch-icon" href="icon/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/*
  Target : Infinix Note 30 · 1080×2460px · ~393×829 dp viewport
  Theme  : Light
*/
:root {
  --bg:       #eef2ff;
  --bg2:      #e4e9fb;
  --card:     #ffffff;
  --inp:      #f3f6ff;
  --border:   #dde3f5;
  --bact:     #6366f1;
  --accent:   #6366f1;
  --accent-l: #eef2ff;
  --green:    #16a34a;
  --green-l:  #dcfce7;
  --red:      #dc2626;
  --red-l:    #fee2e2;
  --blue:     #2563eb;
  --blue-l:   #dbeafe;
  --amber:    #d97706;
  --t1:       #0f172a;
  --t2:       #475569;
  --t3:       #94a3b8;
  --shadow:   0 2px 12px rgba(99,102,241,0.10);
  --shadow-g: 0 4px 18px rgba(22,163,74,0.18);
  --shadow-b: 0 4px 18px rgba(37,99,235,0.16);
  --mono:     'Space Mono', monospace;
  --sans:     'DM Sans', system-ui, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
::-webkit-scrollbar { display:none; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--t1);
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ──────────────────────────────────── */
.topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 8px;
  padding-top: max(10px, env(safe-area-inset-top, 28px));
  background: var(--card);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 8px rgba(99,102,241,0.07);
}

.logo { display:flex; align-items:center; gap:9px; }

.logo-img {
  width: 32px; height: 32px;
  border-radius: 9px; object-fit: cover;
  box-shadow: 0 2px 8px rgba(99,102,241,0.2);
}
.logo-fallback {
  width:32px; height:32px; border-radius:9px;
  background: linear-gradient(135deg, #6366f1, #818cf8);
  display:none; align-items:center; justify-content:center;
  font-size:16px; box-shadow: 0 2px 8px rgba(99,102,241,0.3);
}
.logo-text { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--t1); letter-spacing:-0.3px; }
.logo-text b { color:var(--accent); }

.pwa-chip {
  font-family:var(--mono); font-size:8px; font-weight:700;
  color:var(--accent); background:var(--accent-l);
  border:1.5px solid #c7d2fe; border-radius:20px;
  padding:3px 10px; cursor:pointer; display:none; letter-spacing:0.3px;
}
.pwa-chip.show { display:block; }

/* ── MAIN ────────────────────────────────────── */
.main {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 14px 8px;
  padding-bottom: max(8px, env(safe-area-inset-bottom, 0px));
  overflow: hidden;
}

/* ── CARD ────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 11px 13px;
  flex-shrink: 0;
  box-shadow: var(--shadow);
}
.card-build { flex:1; min-height:0; display:flex; flex-direction:column; }

.card-title {
  font-family:var(--mono); font-size:7.5px; font-weight:700;
  letter-spacing:1.4px; color:var(--t3); text-transform:uppercase;
  margin-bottom:9px; display:flex; align-items:center; gap:7px;
}
.card-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── 2 COL ───────────────────────────────────── */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:9px; }

/* ── FIELD ───────────────────────────────────── */
.field { display:flex; flex-direction:column; gap:4px; }

.flabel {
  font-size:10px; font-weight:600; color:var(--t2);
  display:flex; align-items:center; justify-content:space-between;
}

.token-toggle {
  font-family:var(--mono); font-size:7.5px; font-weight:700;
  color:var(--accent); background:var(--accent-l);
  border:1px solid #c7d2fe; padding:2px 8px;
  border-radius:20px; cursor:pointer; white-space:nowrap;
}
.save-badge {
  font-family:var(--mono); font-size:7.5px; font-weight:700;
  color:var(--green); background:var(--green-l);
  border:1px solid #bbf7d0; padding:2px 8px;
  border-radius:20px; display:none; white-space:nowrap;
}

input[type="text"], input[type="password"] {
  width:100%; padding:8px 10px; border-radius:10px;
  border:1.5px solid var(--border); background:var(--inp);
  color:var(--t1); font-family:var(--mono); font-size:11px;
  outline:none; transition:all 0.18s; -webkit-appearance:none;
}
input::placeholder { color:var(--t3); font-size:10px; }
input:focus { border-color:var(--bact); background:#fff; box-shadow:0 0 0 3px rgba(99,102,241,0.12); }

/* ── SAVE ROW ────────────────────────────────── */
.save-row { display:flex; gap:8px; margin-top:9px; }

/* ── BUTTONS ─────────────────────────────────── */
button { border:none; cursor:pointer; font-family:var(--sans); font-weight:600; transition:all 0.18s; -webkit-appearance:none; }
button:active { transform:scale(0.96); }

.btn-save {
  flex:1; padding:9px 0; font-size:12px;
  background:var(--accent); color:#fff; border-radius:30px;
  box-shadow:0 2px 10px rgba(99,102,241,0.25);
}
.btn-save.saved { background:var(--green); box-shadow:0 2px 10px rgba(22,163,74,0.25); }

.btn-clear {
  flex:1; padding:9px 0; font-size:12px;
  background:var(--inp); color:var(--t2);
  border-radius:30px; border:1.5px solid var(--border);
}

/* ── FILE PICK ───────────────────────────────── */
.file-pick {
  display:flex; align-items:center; gap:9px; padding:9px 11px;
  border-radius:11px; border:1.5px dashed var(--border);
  background:var(--inp); cursor:pointer; position:relative; transition:all 0.18s;
}
.file-pick.has-file { border-color:#86efac; background:var(--green-l); }
.file-pick input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.file-icon { font-size:18px; flex-shrink:0; }
.file-info { flex:1; overflow:hidden; }
.file-info-title { font-size:11px; font-weight:600; color:var(--t2); }
.file-info-sub { font-family:var(--mono); font-size:9px; color:var(--t3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.file-info-sub.ok { color:var(--green); }

/* ── BUILD BTN ───────────────────────────────── */
.btn-build {
  width:100%; padding:13px; font-size:14px; font-weight:700;
  background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff;
  border-radius:12px; box-shadow:var(--shadow-g); letter-spacing:0.1px;
}
.btn-build:disabled {
  background:#d1fae5; color:#6ee7b7;
  box-shadow:none; transform:none; cursor:not-allowed;
}

/* ── PROGRESS ────────────────────────────────── */
.progress-wrap { display:none; margin-top:8px; }
.progress-track { height:4px; background:var(--bg2); border-radius:4px; overflow:hidden; }
.progress-fill {
  height:100%; background:linear-gradient(90deg,#22c55e,#6366f1);
  border-radius:4px; width:0%; transition:width 0.4s ease;
}
.progress-row { display:flex; justify-content:space-between; margin-top:3px; }
.progress-label { font-family:var(--mono); font-size:8.5px; color:var(--t3); }

/* ── LOADER ──────────────────────────────────── */
.loader { display:none; gap:4px; justify-content:center; margin:6px 0 2px; }
.loader.on { display:flex; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.4s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay:.2s; background:#22c55e; }
.dot:nth-child(3) { animation-delay:.4s; background:var(--blue); }
@keyframes pulse { 0%,80%,100%{transform:scale(0.4);opacity:0.3;} 40%{transform:scale(1);opacity:1;} }

/* ── STATUS ──────────────────────────────────── */
.status-box {
  padding:9px 11px; border-radius:11px; background:var(--inp);
  border:1.5px solid var(--border); font-family:var(--mono);
  font-size:10px; color:var(--t2); word-break:break-word;
  line-height:1.55; margin-top:8px; transition:all 0.2s; flex-shrink:0;
}
.status-box.error   { color:var(--red);   background:var(--red-l);   border-color:#fca5a5; }
.status-box.success { color:var(--green); background:var(--green-l); border-color:#86efac; }
.status-box.info    { color:var(--blue);  background:var(--blue-l);  border-color:#93c5fd; }

/* ── DOWNLOAD ────────────────────────────────── */
.btn-download {
  width:100%; padding:12px; font-size:13px; font-weight:700;
  background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff;
  border-radius:12px; box-shadow:var(--shadow-b); margin-top:8px; flex-shrink:0;
}
.btn-download:disabled {
  background:#dbeafe; color:#93c5fd;
  box-shadow:none; transform:none; cursor:not-allowed;
}

.btn-install {
  width:100%; padding:9px; font-size:12px;
  background:var(--accent-l); color:var(--accent);
  border:1.5px solid #c7d2fe; border-radius:12px;
  margin-top:7px; display:none; flex-shrink:0;
}
.btn-install.show { display:block; }

/* ── FOOTER ──────────────────────────────────── */
.footer {
  flex-shrink:0; text-align:center;
  font-family:var(--mono); font-size:8.5px; color:var(--t3);
  padding:4px 0 max(6px, env(safe-area-inset-bottom, 0px));
  background:var(--card); border-top:1px solid var(--border);
  letter-spacing:0.4px;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <img src="icon/icon-192.png" class="logo-img"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="logo-fallback">⚡</div>
    <div class="logo-text">APK<b>Builder</b></div>
  </div>
  <button class="pwa-chip" id="installBtn" onclick="installPWA()">+ INSTALL</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- 01 KONFIGURASI -->
  <div class="card">
    <div class="card-title">01 — Konfigurasi</div>
    <div class="two-col">
      <div class="field">
        <div class="flabel">
          GitHub Token
          <span class="token-toggle" onclick="toggleToken()">👁 Lihat</span>
        </div>
        <input type="password" id="token" placeholder="ghp_xxx..." oninput="markUnsaved()">
        <span class="save-badge" id="tokenSaved">✓ Tersimpan</span>
      </div>
      <div class="field">
        <div class="flabel">
          Repo Workflow
          <span class="save-badge" id="repoSaved">✓ Simpan</span>
        </div>
        <input type="text" id="workflowRepo" placeholder="user/repo" oninput="markUnsaved()">
      </div>
    </div>
    <div class="save-row">
      <button class="btn-save" id="btnSave" onclick="saveSettings()">💾 Simpan</button>
      <button class="btn-clear" onclick="clearSettings()">🗑 Hapus</button>
    </div>
  </div>

  <!-- 02 PROJECT -->
  <div class="card">
    <div class="card-title">02 — Project</div>
    <div class="field">
      <div class="flabel">File ZIP</div>
      <div class="file-pick" id="filePick">
        <input type="file" id="zipFile" accept=".zip" onchange="onFileSelect(this)">
        <div class="file-icon" id="fileIcon">📂</div>
        <div class="file-info">
          <div class="file-info-title" id="fileTitle">Pilih file ZIP project</div>
          <div class="file-info-sub" id="fileSub">Tap untuk browse · format .zip</div>
        </div>
      </div>
    </div>
    <div class="field" style="margin-top:7px">
      <div class="flabel">Nama App</div>
      <input type="text" id="appName" placeholder="contoh: my-app">
    </div>
  </div>

  <!-- 03 BUILD -->
  <div class="card card-build">
    <div class="card-title">03 — Build &amp; Download</div>
    <button class="btn-build" id="btnBuild" onclick="startBuild()">⚡ Upload &amp; Build APK</button>

    <div class="progress-wrap" id="progressBar">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-row">
        <span class="progress-label" id="progressPct">0%</span>
        <span class="progress-label">GitHub Actions</span>
      </div>
    </div>

    <div class="loader" id="loader">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="status-box" id="status">✅ Siap membangun APK</div>

    <button class="btn-download" id="btnDownload" onclick="downloadApk()" disabled>📦 Download APK</button>
    <button class="btn-install" id="installBtnBottom" onclick="installPWA()">📱 Install Aplikasi</button>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">APK Builder Pro · PWA · v2.0</div>

<script>
let runId=null,artifactUrl=null,deferredPrompt=null;

window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('installBtn').classList.add('show');
  document.getElementById('installBtnBottom').classList.add('show');
});
function installPWA(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{
    deferredPrompt=null;
    document.getElementById('installBtn').classList.remove('show');
    document.getElementById('installBtnBottom').classList.remove('show');
  });
}
if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
window.addEventListener('load',()=>{loadSettings();setStatus('✅ Siap membangun APK');});

function onFileSelect(input){
  const file=input.files[0];if(!file)return;
  document.getElementById('filePick').classList.add('has-file');
  document.getElementById('fileIcon').textContent='✅';
  const name=file.name;
  document.getElementById('fileTitle').textContent=name.length>24?name.substring(0,24)+'…':name;
  const sub=document.getElementById('fileSub');
  sub.textContent=(file.size/1024/1024).toFixed(2)+' MB';sub.classList.add('ok');
}
function setStatus(msg,type=''){
  const el=document.getElementById('status');
  el.textContent=msg;el.className='status-box'+(type?' '+type:'');
}
function setProgress(pct){
  const wrap=document.getElementById('progressBar');
  wrap.style.display=pct>0?'block':'none';
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
}
function setLoading(on){
  const l=document.getElementById('loader');
  on?l.classList.add('on'):l.classList.remove('on');
}
function toggleToken(){
  const el=document.getElementById('token'),t=document.querySelector('.token-toggle');
  if(el.type==='password'){el.type='text';t.textContent='🙈 Tutup';}
  else{el.type='password';t.textContent='👁 Lihat';}
}
function saveSettings(){
  const token=document.getElementById('token').value.trim();
  const repo=document.getElementById('workflowRepo').value.trim();
  if(!token&&!repo)return setStatus('⚠️ Token dan repo kosong.','error');
  if(token)localStorage.setItem('apk_token',token);
  if(repo)localStorage.setItem('apk_repo',repo);
  showSavedBadges();
  const btn=document.getElementById('btnSave');
  btn.textContent='✅ Tersimpan!';btn.classList.add('saved');
  setTimeout(()=>{btn.textContent='💾 Simpan';btn.classList.remove('saved');},1800);
  setStatus('✅ Pengaturan disimpan!','success');
}
function clearSettings(){
  localStorage.removeItem('apk_token');localStorage.removeItem('apk_repo');
  document.getElementById('token').value='';document.getElementById('workflowRepo').value='';
  document.getElementById('tokenSaved').style.display='none';
  document.getElementById('repoSaved').style.display='none';
  setStatus('🗑 Pengaturan dihapus.','info');
}
function loadSettings(){
  const token=localStorage.getItem('apk_token');
  const repo=localStorage.getItem('apk_repo');
  if(token)document.getElementById('token').value=token;
  if(repo)document.getElementById('workflowRepo').value=repo;
  if(token||repo)showSavedBadges();
}
function showSavedBadges(){
  document.getElementById('tokenSaved').style.display=localStorage.getItem('apk_token')?'inline-block':'none';
  document.getElementById('repoSaved').style.display=localStorage.getItem('apk_repo')?'inline-block':'none';
}
function markUnsaved(){
  document.getElementById('tokenSaved').style.display='none';
  document.getElementById('repoSaved').style.display='none';
}
function getInputs(){
  return{
    token:document.getElementById('token').value.trim(),
    workflowRepo:document.getElementById('workflowRepo').value.trim(),
    file:document.getElementById('zipFile').files[0],
    appName:document.getElementById('appName').value.trim()||'my-app'
  };
}
async function uploadToRelease(token,owner,repo,file,appName){
  const tag=`build-${appName}-${Date.now()}`;const filePath=`uploads/${tag}.zip`;
  setStatus('📦 Encoding ZIP...','info');setProgress(15);
  const arrayBuffer=await file.arrayBuffer();const bytes=new Uint8Array(arrayBuffer);
  let binary='';const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk)binary+=String.fromCharCode(...bytes.subarray(i,i+chunk));
  const base64Content=btoa(binary);
  setStatus('⬆️ Upload ke GitHub...','info');setProgress(30);
  let sha;
  const checkRes=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`,
    {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
  if(checkRes.ok)sha=(await checkRes.json()).sha;
  const body={message:`Upload ${file.name}`,content:base64Content};if(sha)body.sha=sha;
  const uploadRes=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`,{
    method:'PUT',
    headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!uploadRes.ok){const err=await uploadRes.json().catch(()=>({}));throw new Error('Upload gagal: '+(err.message||uploadRes.status));}
  const asset=await uploadRes.json();setProgress(48);
  return{zipUrl:asset.content.download_url};
}
async function triggerWorkflow(token,owner,repo,zipUrl,appName){
  setStatus('🚀 Memicu GitHub Actions...','info');setProgress(55);
  const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/dispatches`,{
    method:'POST',
    headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
    body:JSON.stringify({event_type:'build-apk',client_payload:{zip_url:zipUrl,app_name:appName}})
  });
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error('Trigger gagal: '+(err.message||res.status));}
}
async function waitForRunId(token,owner,repo){
  setStatus('⏳ Menunggu workflow...','info');setProgress(65);
  for(let i=0;i<22;i++){
    await sleep(4500);
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?event=repository_dispatch&per_page=1`,
      {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
    const data=await res.json();
    if(data.workflow_runs?.length>0)return data.workflow_runs[0].id;
  }
  throw new Error('Timeout: Actions tidak merespon (100s)');
}
async function waitForBuild(token,owner,repo,rid){
  setStatus('🔨 Compile APK...','info');setProgress(72);
  for(let i=0;i<55;i++){
    await sleep(9000);
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs/${rid}`,
      {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
    const run=await res.json();
    setStatus(`🔧 ${run.status||'pending'} ${run.conclusion?'· '+run.conclusion:'· building...'}`, 'info');
    setProgress(72+Math.min(i,22));
    if(run.status==='completed'){
      if(run.conclusion!=='success')throw new Error('Build gagal: '+run.conclusion);
      return true;
    }
  }
  throw new Error('Timeout: Build > 8 menit');
}
async function getArtifactUrl(token,owner,repo,rid){
  setStatus('📥 Ambil link download...','info');setProgress(95);
  for(let i=0;i<12;i++){
    await sleep(4000);
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/apk-result.json`,
      {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'},cache:'no-store'});
    if(!res.ok)continue;
    const data=await res.json();
    const content=JSON.parse(atob(data.content.replace(/\n/g,'')));
    if(String(content.run_id)===String(rid)&&content.url)return content.url;
  }
  throw new Error('Link APK tidak ditemukan');
}
async function startBuild(){
  const{token,workflowRepo,file,appName}=getInputs();
  if(!token)return setStatus('❌ Masukkan GitHub Token!','error');
  if(!workflowRepo||!workflowRepo.includes('/'))return setStatus('❌ Format: "username/repo"','error');
  if(!file)return setStatus('❌ Pilih file ZIP project!','error');
  const[owner,repo]=workflowRepo.split('/');
  const buildBtn=document.getElementById('btnBuild');
  const downloadBtn=document.getElementById('btnDownload');
  buildBtn.disabled=true;downloadBtn.disabled=true;
  setLoading(true);setProgress(8);runId=null;artifactUrl=null;
  try{
    const{zipUrl}=await uploadToRelease(token,owner,repo,file,appName);
    await triggerWorkflow(token,owner,repo,zipUrl,appName);
    runId=await waitForRunId(token,owner,repo);
    await waitForBuild(token,owner,repo,runId);
    artifactUrl=await getArtifactUrl(token,owner,repo,runId);
    setProgress(100);
    setStatus('✅ APK siap! Klik Download.','success');
    downloadBtn.disabled=false;
  }catch(err){
    setStatus('❌ '+err.message,'error');setProgress(0);
  }finally{
    setLoading(false);buildBtn.disabled=false;
  }
}
function downloadApk(){
  if(!artifactUrl)return setStatus('⚠️ Build dulu sebelum download.','error');
  const a=document.createElement('a');
  a.href=artifactUrl;a.download='';a.target='_blank';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setStatus('📲 Download dimulai!','success');
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
</body>
