<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>APK Builder Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APK Builder">
<link rel="apple-touch-icon" href="icon/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon/icon-192.png">
<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
  min-height: 100vh;
}
.container {
  max-width: 500px;
  margin: 40px auto;
  padding: 20px;
}
.card {
  background: rgba(30, 41, 59, 0.9);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
h1 { text-align: center; margin-bottom: 5px; font-size: 24px; }
.subtitle {
  text-align: center;
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 20px;
}
.field { margin-top: 12px; }
.field label {
  font-size: 12px;
  color: #94a3b8;
  display: block;
  margin-bottom: 5px;
}
input[type="text"], input[type="password"] {
  width: 100%;
  padding: 11px 14px;
  border-radius: 10px;
  border: 1px solid #1e293b;
  background: #020617;
  color: white;
  font-size: 14px;
  outline: none;
  transition: 0.2s;
}
input:focus { border-color: #3b82f6; }
input[type="file"] {
  width: 100%;
  padding: 11px 14px;
  border-radius: 10px;
  border: 1px solid #1e293b;
  background: #020617;
  color: #94a3b8;
  font-size: 13px;
  cursor: pointer;
}
button {
  width: 100%;
  padding: 13px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}
button:active { transform: scale(0.98); }
.btn-build { background: #22c55e; color: black; }
.btn-build:hover { background: #16a34a; }
.btn-build:disabled { background: #166534; color: #4ade80; cursor: not-allowed; transform: none; }
.btn-download { background: #3b82f6; color: white; }
.btn-download:hover { background: #2563eb; }
.btn-download:disabled { background: #1e3a5f; color: #60a5fa; cursor: not-allowed; transform: none; }
.btn-install { background: #8b5cf6; color: white; display: none; }
.btn-install.show { display: block; }
.divider {
  border: none;
  border-top: 1px solid #1e293b;
  margin: 18px 0;
}
.status-box {
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: 10px;
  background: #020617;
  font-size: 13px;
  color: #94a3b8;
  min-height: 44px;
  line-height: 1.6;
}
.status-box.error { color: #f87171; }
.status-box.success { color: #4ade80; }
.status-box.info { color: #60a5fa; }
.loader {
  display: none;
  text-align: center;
  margin-top: 10px;
}
.loader div {
  width: 9px; height: 9px;
  margin: 3px;
  background: #22c55e;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1.2s infinite ease-in-out;
}
.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}
.progress {
  display: none;
  margin-top: 10px;
  background: #1e293b;
  border-radius: 999px;
  height: 6px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #3b82f6);
  border-radius: 999px;
  transition: width 0.3s;
  width: 0%;
}
.footer {
  text-align: center;
  font-size: 12px;
  color: #475569;
  margin-top: 20px;
}

.save-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.btn-save {
  flex: 1;
  background: #0ea5e9;
  color: white;
  margin-top: 0;
}
.btn-save:hover { background: #0284c7; }
.btn-save.saved { background: #166534; color: #4ade80; }
.btn-clear {
  width: auto;
  padding: 13px 16px;
  margin-top: 0;
  background: #1e293b;
  color: #94a3b8;
  font-size: 13px;
}
.btn-clear:hover { background: #334155; }
.save-badge {
  float: right;
  font-size: 10px;
  color: #4ade80;
  background: #14532d;
  padding: 2px 7px;
  border-radius: 999px;
  font-weight: normal;
}

.token-toggle {
  font-size: 11px;
  color: #3b82f6;
  cursor: pointer;
  float: right;
  margin-top: -2px;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>🚀 APK Builder</h1>
    <div class="subtitle">Upload project ZIP → Build APK via GitHub Actions</div>

    <div class="field">
      <label>
        GitHub Token
        <span class="token-toggle" onclick="toggleToken()">👁 Tampilkan</span>
        <span class="save-badge" id="tokenSaved" style="display:none">✓ Tersimpan</span>
      </label>
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxx" oninput="markUnsaved()">
    </div>

    <div class="field">
      <label>
        Owner/Repo Workflow (tempat build.yml)
        <span class="save-badge" id="repoSaved" style="display:none">✓ Tersimpan</span>
      </label>
      <input type="text" id="workflowRepo" placeholder="username/apk-builder-workflow" oninput="markUnsaved()">
    </div>

    <div class="save-row">
      <button class="btn-save" id="btnSave" onclick="saveSettings()">💾 Simpan Pengaturan</button>
      <button class="btn-clear" onclick="clearSettings()">🗑 Hapus</button>
    </div>

    <hr class="divider">

    <div class="field">
      <label>File ZIP Project</label>
      <input type="file" id="zipFile" accept=".zip">
    </div>

    <div class="field">
      <label>Nama App (untuk penamaan release)</label>
      <input type="text" id="appName" placeholder="contoh: my-app">
    </div>

    <button class="btn-build" id="btnBuild" onclick="startBuild()">⚡ Upload & Build APK</button>

    <div class="progress" id="progressBar">
      <div class="progress-bar" id="progressFill"></div>
    </div>

    <div class="loader" id="loader">
      <div></div><div></div><div></div>
    </div>

    <div class="status-box" id="status">Status: siap</div>

    <button class="btn-download" id="btnDownload" onclick="downloadApk()" disabled>
      📦 Download APK
    </button>

    <button class="btn-install" id="installBtn" onclick="installPWA()">
      📱 Install Aplikasi
    </button>
  </div>
  <div class="footer">APK Builder Pro • PWA Ready ⚡ • No Backend Needed</div>
</div>

<script>
// ── State ──────────────────────────────────────────
let runId = null;
let artifactUrl = null;
let pollTimer = null;
let deferredPrompt = null;

// ── PWA ────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').classList.add('show');
});
function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('installBtn').classList.remove('show');
  });
}
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
  loadSettings();
}

// ── UI Helpers ─────────────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-box' + (type ? ' ' + type : '');
}
function setProgress(pct) {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  bar.style.display = pct > 0 ? 'block' : 'none';
  fill.style.width = pct + '%';
}
function setLoading(on) {
  document.getElementById('loader').style.display = on ? 'block' : 'none';
}
function toggleToken() {
  const el = document.getElementById('token');
  const toggle = document.querySelector('.token-toggle');
  if (el.type === 'password') {
    el.type = 'text';
    toggle.textContent = '🙈 Sembunyikan';
  } else {
    el.type = 'password';
    toggle.textContent = '👁 Tampilkan';
  }
}


// ── Simpan Pengaturan ──────────────────────────────
function saveSettings() {
  const token = document.getElementById('token').value.trim();
  const repo = document.getElementById('workflowRepo').value.trim();
  if (!token && !repo) return setStatus('❌ Token dan repo kosong, tidak ada yang disimpan.', 'error');
  if (token) localStorage.setItem('apk_token', token);
  if (repo) localStorage.setItem('apk_repo', repo);
  showSavedBadges();
  const btn = document.getElementById('btnSave');
  btn.textContent = '✅ Tersimpan!';
  btn.classList.add('saved');
  setTimeout(() => {
    btn.textContent = '💾 Simpan Pengaturan';
    btn.classList.remove('saved');
  }, 2000);
}

function clearSettings() {
  localStorage.removeItem('apk_token');
  localStorage.removeItem('apk_repo');
  document.getElementById('token').value = '';
  document.getElementById('workflowRepo').value = '';
  document.getElementById('tokenSaved').style.display = 'none';
  document.getElementById('repoSaved').style.display = 'none';
  setStatus('🗑 Pengaturan dihapus.', 'info');
}

function loadSettings() {
  const token = localStorage.getItem('apk_token');
  const repo = localStorage.getItem('apk_repo');
  if (token) document.getElementById('token').value = token;
  if (repo) document.getElementById('workflowRepo').value = repo;
  if (token || repo) showSavedBadges();
}

function showSavedBadges() {
  if (localStorage.getItem('apk_token'))
    document.getElementById('tokenSaved').style.display = 'inline';
  if (localStorage.getItem('apk_repo'))
    document.getElementById('repoSaved').style.display = 'inline';
}

function markUnsaved() {
  document.getElementById('tokenSaved').style.display = 'none';
  document.getElementById('repoSaved').style.display = 'none';
}

// ── Validasi Input ─────────────────────────────────
function getInputs() {
  const token = document.getElementById('token').value.trim();
  const workflowRepo = document.getElementById('workflowRepo').value.trim();
  const file = document.getElementById('zipFile').files[0];
  const appName = document.getElementById('appName').value.trim() || 'my-app';
  return { token, workflowRepo, file, appName };
}

// ── Upload ZIP ke GitHub via Contents API (CORS-safe) ──
async function uploadToRelease(token, owner, repo, file, appName) {
  const tag = `build-${appName}-${Date.now()}`;
  const filePath = `uploads/${tag}.zip`;

  // Encode file ke base64
  setStatus('📦 Menyiapkan file ZIP...', 'info');
  setProgress(15);
  const arrayBuffer = await file.arrayBuffer();
  const bytes = new Uint8Array(arrayBuffer);
  let binary = '';
  const chunkSize = 8192;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }
  const base64Content = btoa(binary);

  // Cek apakah file sudah ada (perlu SHA untuk update)
  setStatus('⬆️ Mengupload ZIP ke GitHub...', 'info');
  setProgress(30);
  let sha = undefined;
  const checkRes = await fetch(
    `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`,
    { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
  );
  if (checkRes.ok) {
    const existing = await checkRes.json();
    sha = existing.sha;
  }

  // Upload via Contents API (CORS-safe, tidak pakai uploads.github.com)
  const body = {
    message: `Upload ${file.name} for build`,
    content: base64Content
  };
  if (sha) body.sha = sha;

  const uploadRes = await fetch(
    `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`,
    {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${token}`,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    }
  );
  if (!uploadRes.ok) {
    const err = await uploadRes.json();
    throw new Error('Gagal upload ZIP: ' + (err.message || uploadRes.status));
  }
  const asset = await uploadRes.json();

  // URL raw download langsung dari repo (CORS-safe)
  const zipUrl = asset.content.download_url;
  setProgress(45);
  return { zipUrl, tag };
}

// ── Trigger GitHub Actions ─────────────────────────
async function triggerWorkflow(token, owner, repo, zipUrl, appName) {
  setStatus('🚀 Memicu GitHub Actions...', 'info');
  setProgress(55);
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/dispatches`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      event_type: 'build-apk',
      client_payload: { zip_url: zipUrl, app_name: appName }
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error('Gagal trigger workflow: ' + (err.message || res.status));
  }
}

// ── Polling: Cari Run ID ───────────────────────────
async function waitForRunId(token, owner, repo) {
  setStatus('⏳ Menunggu GitHub Actions mulai...', 'info');
  setProgress(65);
  for (let i = 0; i < 20; i++) {
    await sleep(5000);
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/actions/runs?event=repository_dispatch&per_page=1`,
      { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
    );
    const data = await res.json();
    if (data.workflow_runs && data.workflow_runs.length > 0) {
      return data.workflow_runs[0].id;
    }
  }
  throw new Error('Timeout: GitHub Actions tidak mulai dalam 100 detik');
}

// ── Polling: Tunggu Build Selesai ──────────────────
async function waitForBuild(token, owner, repo, rid) {
  setStatus('🔨 Build sedang berjalan di GitHub Actions...', 'info');
  setProgress(75);
  for (let i = 0; i < 60; i++) {
    await sleep(10000);
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/actions/runs/${rid}`,
      { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
    );
    const run = await res.json();
    setStatus(`🔨 Build: ${run.status} (${run.conclusion || 'running'})... ${Math.round((i+1)*10/60)} menit`, 'info');
    setProgress(75 + Math.min(i, 20));
    if (run.status === 'completed') {
      if (run.conclusion !== 'success') throw new Error('Build gagal: ' + run.conclusion);
      return true;
    }
  }
  throw new Error('Timeout: Build tidak selesai dalam 10 menit');
}

// ── Ambil URL Download Artifact ────────────────────
async function getArtifactUrl(token, owner, repo, rid) {
  setStatus('📥 Mengambil link APK...', 'info');
  setProgress(97);
  const res = await fetch(
    `https://api.github.com/repos/${owner}/${repo}/actions/runs/${rid}/artifacts`,
    { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
  );
  const data = await res.json();
  if (!data.artifacts || data.artifacts.length === 0) throw new Error('Artifact tidak ditemukan');
  return data.artifacts[0].archive_download_url;
}

// ── Main: Start Build ──────────────────────────────
async function startBuild() {
  const { token, workflowRepo, file, appName } = getInputs();
  if (!token) return setStatus('❌ Masukkan GitHub Token dulu!', 'error');
  if (!workflowRepo || !workflowRepo.includes('/')) return setStatus('❌ Format repo harus username/repo', 'error');
  if (!file) return setStatus('❌ Pilih file ZIP dulu!', 'error');

  const [owner, repo] = workflowRepo.split('/');

  document.getElementById('btnBuild').disabled = true;
  document.getElementById('btnDownload').disabled = true;
  setLoading(true);
  setProgress(10);
  runId = null;
  artifactUrl = null;

  try {
    // 1. Upload ZIP ke GitHub Release
    const { zipUrl } = await uploadToRelease(token, owner, repo, file, appName);

    // 2. Trigger workflow
    await triggerWorkflow(token, owner, repo, zipUrl, appName);

    // 3. Tunggu run ID muncul
    runId = await waitForRunId(token, owner, repo);

    // 4. Tunggu build selesai
    await waitForBuild(token, owner, repo, runId);

    // 5. Ambil artifact
    artifactUrl = await getArtifactUrl(token, owner, repo, runId);

    setProgress(100);
    setStatus('✅ Build selesai! Klik Download APK untuk mengunduh.', 'success');
    document.getElementById('btnDownload').disabled = false;
  } catch (e) {
    setStatus('❌ ' + e.message, 'error');
    setProgress(0);
  } finally {
    setLoading(false);
    document.getElementById('btnBuild').disabled = false;
  }
}

// ── Download APK ───────────────────────────────────
function downloadApk() {
  if (!artifactUrl) return setStatus('❌ Belum ada APK. Jalankan build dulu!', 'error');
  // GitHub artifact archive_download_url melakukan redirect ke storage eksternal
  // yang tidak support CORS — tidak bisa di-fetch langsung dari browser.
  // Solusi: buka di tab baru, browser ikuti redirect dan download otomatis.
  setStatus('⬇️ Membuka halaman download di tab baru...', 'info');
  window.open(artifactUrl, '_blank');
  setStatus('✅ Tab download dibuka! Login GitHub jika diminta, lalu klik download.', 'success');
}

// ── Helper ─────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
