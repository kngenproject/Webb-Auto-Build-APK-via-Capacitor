<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>APK Builder Pro · Compact</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APK Builder">
<link rel="apple-touch-icon" href="icon/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon/icon-192.png">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #0f172a, #020617);
  font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
  color: #e2e8f0;
  overflow: hidden;           /* core: prevent body scroll */
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.2;
}

.container {
  width: 100%;
  max-width: 520px;
  margin: 0 auto;
  padding: 0 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

.card {
  background: rgba(30, 41, 59, 0.88);
  backdrop-filter: blur(12px);
  border-radius: 26px;
  padding: 14px 18px 20px;
  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
  width: 100%;
  border: 1px solid rgba(71, 85, 105, 0.3);
  transition: all 0.2s;
}

/* header */
h1 {
  font-size: 22px;
  text-align: center;
  margin-bottom: 2px;
  letter-spacing: -0.3px;
  font-weight: 700;
  background: linear-gradient(135deg, #f0f9ff, #b9e6ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.subtitle {
  text-align: center;
  font-size: 10px;
  color: #94a3b8;
  margin-bottom: 12px;
  letter-spacing: 0.2px;
}

/* compact grid for token & repo */
.two-col-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 10px;
}

.field {
  margin-top: 0;
}

.field label {
  font-size: 10px;
  font-weight: 500;
  color: #9ca3af;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}

input[type="text"], input[type="password"] {
  width: 100%;
  padding: 8px 10px;
  border-radius: 12px;
  border: 1px solid #1e293b;
  background: #0b1120;
  color: white;
  font-size: 12px;
  font-weight: 500;
  outline: none;
  transition: 0.15s;
}

input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
}

.token-toggle {
  font-size: 9px;
  color: #60a5fa;
  cursor: pointer;
  background: rgba(37,99,235,0.2);
  padding: 2px 8px;
  border-radius: 30px;
  transition: 0.1s;
}

.save-badge {
  font-size: 9px;
  color: #4ade80;
  background: #14532d;
  padding: 2px 8px;
  border-radius: 30px;
  font-weight: normal;
  display: inline-block;
}

/* save row */
.save-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.btn-save, .btn-clear {
  flex: 1;
  padding: 8px 0;
  border-radius: 40px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 0;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-save {
  background: #0ea5e9;
  color: white;
}
.btn-save:hover { background: #0284c7; }
.btn-save.saved { background: #166534; color: #bbf7d0; }

.btn-clear {
  background: #1e293b;
  color: #cbd5e1;
}
.btn-clear:hover { background: #334155; }

/* divider */
.divider {
  border: none;
  border-top: 1px solid rgba(51, 65, 85, 0.6);
  margin: 12px 0;
}

/* file & app name */
.field-file, .field-appname {
  margin-top: 8px;
}
input[type="file"] {
  width: 100%;
  padding: 8px 8px;
  border-radius: 12px;
  border: 1px solid #1e293b;
  background: #0b1120;
  color: #94a3b8;
  font-size: 11px;
  cursor: pointer;
}

/* build button */
.btn-build {
  background: #22c55e;
  color: black;
  padding: 10px;
  margin-top: 12px;
  font-weight: bold;
  font-size: 14px;
  border-radius: 40px;
  transition: 0.2s;
}
.btn-build:disabled {
  background: #166534;
  color: #86efac;
  cursor: not-allowed;
  transform: none;
}

/* progress & loader compact */
.progress {
  display: none;
  margin-top: 8px;
  background: #1e293b;
  border-radius: 30px;
  height: 5px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #3b82f6);
  border-radius: 30px;
  width: 0%;
}

.loader {
  display: none;
  text-align: center;
  margin-top: 6px;
}
.loader div {
  width: 7px;
  height: 7px;
  margin: 2px;
  background: #22c55e;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1.2s infinite ease-in-out;
}
@keyframes bounce {
  0%,80%,100% { transform: scale(0); }
  40% { transform: scale(1); }
}

.status-box {
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: 20px;
  background: #0a0f1c;
  font-size: 11px;
  font-weight: 500;
  color: #94a3b8;
  min-height: 38px;
  word-break: break-word;
  line-height: 1.3;
}
.status-box.error { color: #f87171; background: #2c0f14; }
.status-box.success { color: #4ade80; background: #0a2618; }
.status-box.info { color: #60a5fa; background: #0f172a; }

/* download & install buttons */
.btn-download, .btn-install {
  padding: 9px;
  margin-top: 10px;
  border-radius: 40px;
  font-weight: bold;
  font-size: 14px;
  transition: 0.2s;
}
.btn-download {
  background: #3b82f6;
  color: white;
}
.btn-download:disabled {
  background: #1e3a5f;
  color: #7aa2f7;
  cursor: not-allowed;
}
.btn-install {
  background: #8b5cf6;
  color: white;
  display: none;
}
.btn-install.show {
  display: block;
}

/* footer ultra compact */
.footer {
  text-align: center;
  font-size: 9px;
  color: #475569;
  margin-top: 12px;
  letter-spacing: 0.3px;
}

/* no external scroll ever */
::-webkit-scrollbar {
  display: none;
}

/* additional micro adjustments */
button:active { transform: scale(0.97); }
button {
  cursor: pointer;
  border: none;
}
.field label span {
  display: flex;
  align-items: center;
  gap: 6px;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>⚡ APK Builder</h1>
    <div class="subtitle">Upload ZIP → Build APK via GitHub Actions</div>

    <!-- 2 kolom: Token & Repo Workflow (hemat space vertikal) -->
    <div class="two-col-grid">
      <div class="field">
        <label>
          GitHub Token
          <span class="token-toggle" onclick="toggleToken()">👁 Tampilkan</span>
        </label>
        <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" oninput="markUnsaved()">
        <span class="save-badge" id="tokenSaved" style="display:none; margin-top: 4px; display: inline-block;">✓ Tersimpan</span>
      </div>
      <div class="field">
        <label>
          Repo Workflow
          <span class="save-badge" id="repoSaved" style="display:none">✓ Simpan</span>
        </label>
        <input type="text" id="workflowRepo" placeholder="user/apk-builder" oninput="markUnsaved()">
      </div>
    </div>

    <!-- Tombol simpan/hapus -->
    <div class="save-row">
      <button class="btn-save" id="btnSave" onclick="saveSettings()">💾 Simpan</button>
      <button class="btn-clear" onclick="clearSettings()">🗑 Hapus</button>
    </div>

    <hr class="divider">

    <!-- File & App name -->
    <div class="field field-file">
      <label>📁 File ZIP Project</label>
      <input type="file" id="zipFile" accept=".zip">
    </div>

    <div class="field field-appname">
      <label>🏷️ Nama App (untuk penamaan release)</label>
      <input type="text" id="appName" placeholder="contoh: my-app">
    </div>

    <!-- Build trigger -->
    <button class="btn-build" id="btnBuild" onclick="startBuild()">⚡ Upload & Build APK</button>

    <div class="progress" id="progressBar">
      <div class="progress-bar" id="progressFill"></div>
    </div>

    <div class="loader" id="loader">
      <div></div><div></div><div></div>
    </div>

    <div class="status-box" id="status">✅ Siap membangun APK</div>

    <button class="btn-download" id="btnDownload" onclick="downloadApk()" disabled>
      📦 Download APK
    </button>

    <button class="btn-install" id="installBtn" onclick="installPWA()">
      📱 Install Aplikasi
    </button>

    <div class="footer">APK Builder Pro • PWA Ready • No Scroll</div>
  </div>
</div>

<script>
// ───────────────────────────────────────────────────
// STATE & PWA
// ───────────────────────────────────────────────────
let runId = null;
let artifactUrl = null;
let pollTimer = null;
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').classList.add('show');
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('installBtn').classList.remove('show');
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
  loadSettings();
}

// ── UI helpers compact ────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-box' + (type ? ' ' + type : '');
}

function setProgress(pct) {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  bar.style.display = pct > 0 ? 'block' : 'none';
  fill.style.width = pct + '%';
}

function setLoading(on) {
  document.getElementById('loader').style.display = on ? 'flex' : 'none';
}

function toggleToken() {
  const el = document.getElementById('token');
  const toggle = document.querySelector('.token-toggle');
  if (el.type === 'password') {
    el.type = 'text';
    toggle.textContent = '🙈 Sembunyi';
  } else {
    el.type = 'password';
    toggle.textContent = '👁 Tampilkan';
  }
}

// ── LocalStorage Settings ──────────────────────────
function saveSettings() {
  const token = document.getElementById('token').value.trim();
  const repo = document.getElementById('workflowRepo').value.trim();
  if (!token && !repo) return setStatus('⚠️ Token dan repo kosong, tidak ada yang disimpan.', 'error');
  if (token) localStorage.setItem('apk_token', token);
  if (repo) localStorage.setItem('apk_repo', repo);
  showSavedBadges();
  const btn = document.getElementById('btnSave');
  btn.textContent = '✅ Tersimpan!';
  btn.classList.add('saved');
  setTimeout(() => {
    btn.textContent = '💾 Simpan';
    btn.classList.remove('saved');
  }, 1800);
  setStatus('✅ Pengaturan disimpan aman!', 'success');
}

function clearSettings() {
  localStorage.removeItem('apk_token');
  localStorage.removeItem('apk_repo');
  document.getElementById('token').value = '';
  document.getElementById('workflowRepo').value = '';
  document.getElementById('tokenSaved').style.display = 'none';
  document.getElementById('repoSaved').style.display = 'none';
  setStatus('🗑 Pengaturan lokal dihapus.', 'info');
}

function loadSettings() {
  const token = localStorage.getItem('apk_token');
  const repo = localStorage.getItem('apk_repo');
  if (token) document.getElementById('token').value = token;
  if (repo) document.getElementById('workflowRepo').value = repo;
  if (token || repo) showSavedBadges();
}

function showSavedBadges() {
  const tokenBadge = document.getElementById('tokenSaved');
  const repoBadge = document.getElementById('repoSaved');
  if (localStorage.getItem('apk_token')) {
    tokenBadge.style.display = 'inline-block';
    tokenBadge.style.marginTop = '4px';
  } else tokenBadge.style.display = 'none';
  if (localStorage.getItem('apk_repo')) repoBadge.style.display = 'inline-block';
  else repoBadge.style.display = 'none';
}

function markUnsaved() {
  document.getElementById('tokenSaved').style.display = 'none';
  document.getElementById('repoSaved').style.display = 'none';
}

// ── Validasi Input ─────────────────────────────────
function getInputs() {
  const token = document.getElementById('token').value.trim();
  const workflowRepo = document.getElementById('workflowRepo').value.trim();
  const file = document.getElementById('zipFile').files[0];
  const appName = document.getElementById('appName').value.trim() || 'my-app';
  return { token, workflowRepo, file, appName };
}

// ── Upload ZIP via GitHub Contents API ─────────────
async function uploadToRelease(token, owner, repo, file, appName) {
  const tag = `build-${appName}-${Date.now()}`;
  const filePath = `uploads/${tag}.zip`;

  setStatus('📦 Mengompresi & encode ZIP...', 'info');
  setProgress(15);
  const arrayBuffer = await file.arrayBuffer();
  const bytes = new Uint8Array(arrayBuffer);
  let binary = '';
  const chunk = 8192;
  for (let i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
  }
  const base64Content = btoa(binary);

  setStatus('⬆️ Upload ZIP ke GitHub repo...', 'info');
  setProgress(30);
  
  let sha = undefined;
  const checkRes = await fetch(
    `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`,
    { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
  );
  if (checkRes.ok) {
    const existing = await checkRes.json();
    sha = existing.sha;
  }

  const body = {
    message: `Upload ${file.name} for APK build`,
    content: base64Content
  };
  if (sha) body.sha = sha;

  const uploadRes = await fetch(
    `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`,
    {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${token}`,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    }
  );
  if (!uploadRes.ok) {
    const err = await uploadRes.json().catch(() => ({}));
    throw new Error('Gagal upload ZIP: ' + (err.message || uploadRes.status));
  }
  const asset = await uploadRes.json();
  const zipUrl = asset.content.download_url;
  setProgress(48);
  return { zipUrl, tag };
}

// ── Trigger Workflow ───────────────────────────────
async function triggerWorkflow(token, owner, repo, zipUrl, appName) {
  setStatus('🚀 Memicu GitHub Actions (build-apk)...', 'info');
  setProgress(55);
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/dispatches`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      event_type: 'build-apk',
      client_payload: { zip_url: zipUrl, app_name: appName }
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error('Gagal trigger workflow: ' + (err.message || res.status));
  }
}

// ── Polling Run ID ─────────────────────────────────
async function waitForRunId(token, owner, repo) {
  setStatus('⏳ Menunggu workflow trigger...', 'info');
  setProgress(65);
  for (let i = 0; i < 22; i++) {
    await sleep(4500);
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/actions/runs?event=repository_dispatch&per_page=1`,
      { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
    );
    const data = await res.json();
    if (data.workflow_runs && data.workflow_runs.length > 0) {
      return data.workflow_runs[0].id;
    }
  }
  throw new Error('Timeout: GitHub Actions tidak merespon dalam 100 detik');
}

// ── Tunggu Build Selesai ───────────────────────────
async function waitForBuild(token, owner, repo, rid) {
  setStatus('🔨 Build berjalan (proses compile APK)...', 'info');
  setProgress(72);
  for (let i = 0; i < 55; i++) {
    await sleep(9000);
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/actions/runs/${rid}`,
      { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
    );
    const run = await res.json();
    const progressMsg = `🔧 status: ${run.status || 'pending'} • ${run.conclusion ? 'selesai' : '...'}`;
    setStatus(progressMsg, 'info');
    setProgress(72 + Math.min(i, 22));
    if (run.status === 'completed') {
      if (run.conclusion !== 'success') throw new Error('Build gagal: ' + run.conclusion);
      return true;
    }
  }
  throw new Error('Timeout: Build melebihi 8 menit, cek log GitHub');
}

// ── Ambil URL dari apk-result.json ─────────────────
async function getArtifactUrl(token, owner, repo, rid) {
  setStatus('📥 Mendapatkan link download APK...', 'info');
  setProgress(95);
  for (let i = 0; i < 12; i++) {
    await sleep(4000);
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/contents/apk-result.json`,
      { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }, cache: 'no-store' }
    );
    if (!res.ok) continue;
    const data = await res.json();
    const decoded = atob(data.content.replace(/\n/g, ''));
    const content = JSON.parse(decoded);
    if (String(content.run_id) === String(rid) && content.url) {
      return content.url;
    }
  }
  throw new Error('Link APK tidak ditemukan. Pastikan workflow sukses dan menghasilkan file apk-result.json');
}

// ── Main Build Flow ────────────────────────────────
async function startBuild() {
  const { token, workflowRepo, file, appName } = getInputs();
  if (!token) return setStatus('❌ Masukkan GitHub Token terlebih dahulu!', 'error');
  if (!workflowRepo || !workflowRepo.includes('/')) return setStatus('❌ Format repo harus "username/repo"', 'error');
  if (!file) return setStatus('❌ Pilih file project ZIP!', 'error');

  const [owner, repo] = workflowRepo.split('/');
  const buildBtn = document.getElementById('btnBuild');
  const downloadBtn = document.getElementById('btnDownload');
  buildBtn.disabled = true;
  downloadBtn.disabled = true;
  setLoading(true);
  setProgress(8);
  runId = null;
  artifactUrl = null;

  try {
    // 1. upload ZIP ke repo via API
    const { zipUrl } = await uploadToRelease(token, owner, repo, file, appName);
    // 2. trigger workflow
    await triggerWorkflow(token, owner, repo, zipUrl, appName);
    // 3. cari run id
    runId = await waitForRunId(token, owner, repo);
    // 4. tunggu build selesai
    await waitForBuild(token, owner, repo, runId);
    // 5. ambil artifact url
    artifactUrl = await getArtifactUrl(token, owner, repo, runId);
    setProgress(100);
    setStatus('✅ APK berhasil dibangun! Klik Download untuk menyimpan.', 'success');
    downloadBtn.disabled = false;
  } catch (err) {
    setStatus(`❌ Gagal: ${err.message}`, 'error');
    setProgress(0);
  } finally {
    setLoading(false);
    buildBtn.disabled = false;
  }
}

// ── Download APK ke perangkat ──────────────────────
function downloadApk() {
  if (!artifactUrl) {
    setStatus('⚠️ Belum ada APK siap. Silakan Build terlebih dahulu.', 'error');
    return;
  }
  const a = document.createElement('a');
  a.href = artifactUrl;
  a.download = '';
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setStatus('📲 Download dimulai! File APK akan tersimpan di HP.', 'success');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ensure initial UI fit: force check
window.addEventListener('load', () => {
  setStatus('✅ Siap • upload ZIP project dan build APK langsung');
  // minimal delay to prevent overflow
  setTimeout(() => {
    if (window.innerHeight > 700) {
      // if huge screen, no problem, but never scroll
      document.body.style.overflow = 'hidden';
    }
  }, 50);
});
</script>
</body>
</html>
