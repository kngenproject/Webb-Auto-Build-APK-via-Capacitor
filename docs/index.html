<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>APK Builder Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f0fdf4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APK Builder">
<link rel="apple-touch-icon" href="icon/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #f0fdf4;
  --bg2:       #dcfce7;
  --card:      #ffffff;
  --card2:     #f0fdf4;
  --border:    rgba(22,163,74,0.15);
  --border-h:  rgba(22,163,74,0.4);
  --inp:       #f7fef9;
  --accent:    #16a34a;
  --accent2:   #15803d;
  --green:     #22c55e;
  --green-d:   #16a34a;
  --blue:      #059669;
  --red:       #dc2626;
  --amber:     #d97706;
  --t1:        #0f172a;
  --t2:        #1e293b;
  --t3:        #475569;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'Outfit', sans-serif;
  --display:   'Syne', sans-serif;
  --r:         14px;
  --r-lg:      20px;
  --glow:      0 0 18px rgba(22,163,74,0.2);
  --glow-g:    0 0 20px rgba(22,163,74,0.25);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--t1);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Ambient background glow */
body::before {
  content:'';
  position:fixed;
  top:-120px; left:-80px;
  width:320px; height:320px;
  background: radial-gradient(circle, rgba(74,222,128,0.2) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
body::after {
  content:'';
  position:fixed;
  bottom:-100px; right:-60px;
  width:260px; height:260px;
  background: radial-gradient(circle, rgba(22,163,74,0.12) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── TOPBAR ──────────────────────────────────── */
.topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px 10px;
  padding-top: max(12px, env(safe-area-inset-top, 44px));
  position: relative; z-index:10;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  background: rgba(240,253,244,0.92);
}

.logo { display:flex; align-items:center; gap:10px; }

.logo-icon {
  width:34px; height:34px; border-radius:10px;
  background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
  display:flex; align-items:center; justify-content:center;
  font-size:17px;
  box-shadow: 0 2px 12px rgba(22,163,74,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
}

.logo-img {
  width:34px; height:34px; border-radius:10px; object-fit:cover;
  box-shadow: 0 2px 12px rgba(22,163,74,0.3);
}
.logo-fallback { display:none; }
.logo-img-wrap { position:relative; }

.logo-text {
  font-family: var(--display);
  font-size:18px; font-weight:800;
  color: var(--t1); letter-spacing:-0.5px;
  line-height:1;
}
.logo-text span { color:#16a34a; }

.logo-badge {
  font-family:var(--mono); font-size:7px; font-weight:500;
  color:var(--t3); letter-spacing:1.5px; text-transform:uppercase;
  margin-top:2px;
}

.pwa-chip {
  font-family:var(--mono); font-size:8px; font-weight:500;
  color:#15803d; background:rgba(22,163,74,0.1);
  border:1px solid rgba(22,163,74,0.25); border-radius:20px;
  padding:4px 11px; cursor:pointer; display:none; letter-spacing:0.5px;
  transition: all 0.2s;
}
.pwa-chip.show { display:block; }
.pwa-chip:hover { background:rgba(22,163,74,0.18); }

/* ── MAIN SCROLL ─────────────────────────────── */
.main {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 14px 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom, 0px));
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative; z-index:1;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.main::-webkit-scrollbar { display:none; }

/* ── CARD ────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}
.card::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(22,163,74,0.08), transparent);
  pointer-events:none;
}

/* ── SECTION LABEL ───────────────────────────── */
.section-label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.section-num {
  font-family: var(--mono);
  font-size: 9px; font-weight: 500;
  color: #15803d;
  background: rgba(22,163,74,0.1);
  border: 1px solid rgba(22,163,74,0.2);
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.8px;
}
.section-title {
  font-family: var(--mono);
  font-size: 10px; font-weight: 500;
  color: #64748b;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  flex: 1;
}
.section-title::after {
  content: '';
  display: inline-block;
  width: 100%;
}

/* ── DIVIDER ─────────────────────────────────── */
.hdivider {
  flex:1; height:1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* ── FIELD ───────────────────────────────────── */
.field { display:flex; flex-direction:column; gap:5px; }

.flabel {
  font-size:10px; font-weight:600; color:#1e293b;
  letter-spacing:0.3px;
  display:flex; align-items:center; justify-content:space-between;
}

.token-toggle {
  font-family:var(--mono); font-size:8px;
  color:#15803d; background:rgba(22,163,74,0.08);
  border:1px solid rgba(22,163,74,0.2); padding:2px 9px;
  border-radius:20px; cursor:pointer; white-space:nowrap;
  transition: all 0.15s;
}
.token-toggle:active { transform:scale(0.95); }

.save-badge {
  font-family:var(--mono); font-size:7.5px;
  color:var(--green); background:rgba(34,197,94,0.1);
  border:1px solid rgba(34,197,94,0.25); padding:2px 9px;
  border-radius:20px; display:none; white-space:nowrap;
}

/* ── INPUTS ──────────────────────────────────── */
input[type="text"], input[type="password"] {
  width:100%; padding:10px 12px;
  border-radius: var(--r);
  border:1.5px solid var(--border);
  background: var(--inp);
  color: #0f172a;
  font-family: var(--mono); font-size:11px;
  outline:none; transition:all 0.18s;
  -webkit-appearance:none;
  caret-color: #16a34a;
}
input::placeholder { color:#94a3b8; font-size:10px; }
input:focus {
  border-color: rgba(22,163,74,0.45);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(22,163,74,0.1), var(--glow);
}

/* ── TWO COL ─────────────────────────────────── */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* ── SAVE ROW ────────────────────────────────── */
.save-row { display:flex; gap:8px; margin-top:12px; }

/* ── BUTTONS ─────────────────────────────────── */
button {
  border:none; cursor:pointer;
  font-family: var(--sans); font-weight:600;
  transition:all 0.18s;
  -webkit-appearance:none;
  outline:none;
}
button:active { transform:scale(0.96); }

.btn-save {
  flex:1; padding:11px 0; font-size:13px;
  background: linear-gradient(135deg, #4ade80, #16a34a);
  color:#052e0a; border-radius:30px;
  box-shadow: 0 4px 16px rgba(74,222,128,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  letter-spacing: 0.2px;
}
.btn-save.saved {
  background: linear-gradient(135deg, #86efac, #4ade80);
  box-shadow: 0 4px 16px rgba(74,222,128,0.4);
}

.btn-clear {
  flex:1; padding:11px 0; font-size:13px;
  background: #f0fdf4;
  color: #334155;
  border-radius:30px;
  border:1.5px solid rgba(22,163,74,0.2);
}
.btn-clear:active { background: #dcfce7; }

/* ── FILE PICK ───────────────────────────────── */
.file-pick {
  display:flex; align-items:center; gap:11px; padding:12px 13px;
  border-radius: var(--r);
  border:1.5px dashed rgba(22,163,74,0.25);
  background: var(--inp); cursor:pointer;
  position:relative; transition:all 0.2s;
}
.file-pick:active { border-color:var(--accent2); background:#fff; }
.file-pick.has-file {
  border-color: rgba(34,197,94,0.4);
  background: rgba(34,197,94,0.05);
  border-style:solid;
}
.file-pick input[type="file"] {
  position:absolute; inset:0; opacity:0; cursor:pointer;
  width:100%; height:100%;
}
.file-icon { font-size:20px; flex-shrink:0; }
.file-info { flex:1; overflow:hidden; }
.file-info-title {
  font-size:12px; font-weight:600; color:#0f172a;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.file-info-sub {
  font-family:var(--mono); font-size:9px; color:#64748b;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:2px;
}
.file-info-sub.ok { color:var(--green); }

/* ── BUILD SECTION ───────────────────────────── */
.build-actions { display:flex; flex-direction:column; gap:8px; }

.btn-build {
  width:100%; padding:14px; font-size:15px; font-weight:700;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color:#fff; border-radius: var(--r);
  box-shadow: var(--glow-g), inset 0 1px 0 rgba(255,255,255,0.15);
  letter-spacing:0.2px; position:relative; overflow:hidden;
}
.btn-build::after {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
  pointer-events:none;
}
.btn-build:disabled {
  background: #1a2e1a; color:#2d5a2d;
  box-shadow:none; transform:none; cursor:not-allowed;
}

/* ── PROGRESS ────────────────────────────────── */
.progress-wrap { display:none; padding:10px 0 4px; }
.progress-track {
  height:3px; background:#dcfce7;
  border-radius:4px; overflow:hidden;
}
.progress-fill {
  height:100%;
  background: linear-gradient(90deg, #4ade80, #86efac);
  border-radius:4px; width:0%;
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 8px rgba(74,222,128,0.6);
}
.progress-row {
  display:flex; justify-content:space-between;
  margin-top:5px;
}
.progress-label {
  font-family:var(--mono); font-size:8px; color:#64748b;
  letter-spacing:0.5px;
}

/* ── LOADER ──────────────────────────────────── */
.loader { display:none; gap:5px; justify-content:center; padding:6px 0; }
.loader.on { display:flex; }
.dot {
  width:5px; height:5px; border-radius:50%;
  background:#16a34a;
  animation:blink 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay:.2s; background:#22c55e; }
.dot:nth-child(3) { animation-delay:.4s; background:#4ade80; }
@keyframes blink {
  0%,80%,100% { transform:scale(0.35); opacity:0.25; }
  40% { transform:scale(1); opacity:1; }
}

/* ── STATUS BOX ──────────────────────────────── */
.status-box {
  padding:10px 13px;
  border-radius: var(--r);
  background: #f0fdf4;
  border:1px solid rgba(22,163,74,0.2);
  font-family:var(--mono); font-size:10px;
  color:#334155; word-break:break-word;
  line-height:1.6; transition:all 0.25s;
}
.status-box.error   {
  color:#dc2626; background:#fff5f5;
  border-color:rgba(220,38,38,0.25);
}
.status-box.success {
  color:#15803d; background:#f0fdf4;
  border-color:rgba(22,163,74,0.3);
}
.status-box.info    {
  color:#0369a1; background:#f0f9ff;
  border-color:rgba(3,105,161,0.25);
}

/* ── DOWNLOAD ────────────────────────────────── */
.btn-download {
  width:100%; padding:13px; font-size:14px; font-weight:700;
  background: linear-gradient(135deg, #22c55e, #15803d);
  color:#f0fdf4; border-radius: var(--r);
  box-shadow: 0 4px 18px rgba(34,197,94,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
  letter-spacing:0.2px; position:relative; overflow:hidden;
}
.btn-download::after {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
  pointer-events:none;
}
.btn-download:disabled {
  background: #0c1f0e; color:#1a4d20;
  box-shadow:none; transform:none; cursor:not-allowed;
}

.btn-install {
  width:100%; padding:10px; font-size:12px;
  background: rgba(22,163,74,0.07);
  color:#15803d;
  border:1px solid rgba(22,163,74,0.2);
  border-radius: var(--r);
  display:none;
}
.btn-install.show { display:block; }

/* ── FOOTER ──────────────────────────────────── */
.footer {
  flex-shrink:0; text-align:center;
  font-family:var(--mono); font-size:8px; color:#94a3b8;
  padding:6px 0 max(8px, env(safe-area-inset-bottom, 0px));
  background: #fff;
  border-top:1px solid rgba(22,163,74,0.12);
  letter-spacing:1px; text-transform:uppercase;
  position:relative; z-index:10;
}

/* ── ANIMATIONS ──────────────────────────────── */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.card { animation: fadeIn 0.35s ease both; }
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.12s; }
.card:nth-child(3) { animation-delay: 0.19s; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div style="position:relative">
      <img src="icon/icon-192.png" class="logo-img"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="logo-icon" style="display:none">⚡</div>
    </div>
    <div>
      <div class="logo-text">APK<span>Builder</span></div>
      <div class="logo-badge">Pro · v2.0</div>
    </div>
  </div>
  <button class="pwa-chip" id="installBtn" onclick="installPWA()">+ INSTALL</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- 01 KONFIGURASI -->
  <div class="card">
    <div class="section-label">
      <span class="section-num">01</span>
      <span class="section-title">Konfigurasi</span>
      <div class="hdivider"></div>
    </div>
    <div class="two-col">
      <div class="field">
        <div class="flabel">
          GitHub Token
          <span class="token-toggle" onclick="toggleToken()">👁 Lihat</span>
        </div>
        <input type="password" id="token" placeholder="ghp_xxx..." oninput="markUnsaved()">
        <span class="save-badge" id="tokenSaved">✓ Tersimpan</span>
      </div>
      <div class="field">
        <div class="flabel">
          Repo Workflow
          <span class="save-badge" id="repoSaved">✓ Simpan</span>
        </div>
        <input type="text" id="workflowRepo" placeholder="user/repo" oninput="markUnsaved()">
      </div>
    </div>
    <div class="save-row">
      <button class="btn-save" id="btnSave" onclick="saveSettings()">💾 Simpan</button>
      <button class="btn-clear" onclick="clearSettings()">🗑 Hapus</button>
    </div>
  </div>

  <!-- 02 PROJECT -->
  <div class="card">
    <div class="section-label">
      <span class="section-num">02</span>
      <span class="section-title">Project</span>
      <div class="hdivider"></div>
    </div>
    <div class="field">
      <div class="flabel">File ZIP</div>
      <div class="file-pick" id="filePick">
        <input type="file" id="zipFile" accept=".zip" onchange="onFileSelect(this)">
        <div class="file-icon" id="fileIcon">📂</div>
        <div class="file-info">
          <div class="file-info-title" id="fileTitle">Pilih file ZIP project</div>
          <div class="file-info-sub" id="fileSub">Tap untuk browse · format .zip</div>
        </div>
      </div>
    </div>
    <div class="field" style="margin-top:10px">
      <div class="flabel">Nama App</div>
      <input type="text" id="appName" placeholder="contoh: my-app">
    </div>
  </div>

  <!-- 03 BUILD -->
  <div class="card">
    <div class="section-label">
      <span class="section-num">03</span>
      <span class="section-title">Build &amp; Download</span>
      <div class="hdivider"></div>
    </div>

    <div class="build-actions">
      <button class="btn-build" id="btnBuild" onclick="startBuild()">⚡ Upload &amp; Build APK</button>

      <div class="progress-wrap" id="progressBar">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-row">
          <span class="progress-label" id="progressPct">0%</span>
          <span class="progress-label">GitHub Actions</span>
        </div>
      </div>

      <div class="loader" id="loader">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>

      <div class="status-box" id="status">✅ Siap membangun APK</div>

      <button class="btn-download" id="btnDownload" onclick="downloadApk()" disabled>📦 Download APK</button>
      <button class="btn-install" id="installBtnBottom" onclick="installPWA()">📱 Install Aplikasi</button>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">APK Builder Pro · PWA · v2.0</div>

<script>
let runId=null,artifactUrl=null,deferredPrompt=null;

window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('installBtn').classList.add('show');
  document.getElementById('installBtnBottom').classList.add('show');
});
function installPWA(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{
    deferredPrompt=null;
    document.getElementById('installBtn').classList.remove('show');
    document.getElementById('installBtnBottom').classList.remove('show');
  });
}
if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
window.addEventListener('load',()=>{loadSettings();setStatus('✅ Siap membangun APK');});

function onFileSelect(input){
  const file=input.files[0];if(!file)return;
  document.getElementById('filePick').classList.add('has-file');
  document.getElementById('fileIcon').textContent='✅';
  const name=file.name;
  document.getElementById('fileTitle').textContent=name.length>26?name.substring(0,26)+'…':name;
  const sub=document.getElementById('fileSub');
  sub.textContent=(file.size/1024/1024).toFixed(2)+' MB · siap diupload';
  sub.classList.add('ok');
}
function setStatus(msg,type=''){
  const el=document.getElementById('status');
  el.textContent=msg;el.className='status-box'+(type?' '+type:'');
}
function setProgress(pct){
  const wrap=document.getElementById('progressBar');
  wrap.style.display=pct>0?'block':'none';
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
}
function setLoading(on){
  const l=document.getElementById('loader');
  on?l.classList.add('on'):l.classList.remove('on');
}
function toggleToken(){
  const el=document.getElementById('token'),t=document.querySelector('.token-toggle');
  if(el.type==='password'){el.type='text';t.textContent='🙈 Tutup';}
  else{el.type='password';t.textContent='👁 Lihat';}
}
function saveSettings(){
  const token=document.getElementById('token').value.trim();
  const repo=document.getElementById('workflowRepo').value.trim();
  if(!token&&!repo)return setStatus('⚠️ Token dan repo kosong.','error');
  if(token)localStorage.setItem('apk_token',token);
  if(repo)localStorage.setItem('apk_repo',repo);
  showSavedBadges();
  const btn=document.getElementById('btnSave');
  btn.textContent='✅ Tersimpan!';btn.classList.add('saved');
  setTimeout(()=>{btn.textContent='💾 Simpan';btn.classList.remove('saved');},1800);
  setStatus('✅ Pengaturan disimpan!','success');
}
function clearSettings(){
  localStorage.removeItem('apk_token');localStorage.removeItem('apk_repo');
  document.getElementById('token').value='';document.getElementById('workflowRepo').value='';
  document.getElementById('tokenSaved').style.display='none';
  document.getElementById('repoSaved').style.display='none';
  setStatus('🗑 Pengaturan dihapus.','info');
}
function loadSettings(){
  const token=localStorage.getItem('apk_token');
  const repo=localStorage.getItem('apk_repo');
  if(token)document.getElementById('token').value=token;
  if(repo)document.getElementById('workflowRepo').value=repo;
  if(token||repo)showSavedBadges();
}
function showSavedBadges(){
  document.getElementById('tokenSaved').style.display=localStorage.getItem('apk_token')?'inline-block':'none';
  document.getElementById('repoSaved').style.display=localStorage.getItem('apk_repo')?'inline-block':'none';
}
function markUnsaved(){
  document.getElementById('tokenSaved').style.display='none';
  document.getElementById('repoSaved').style.display='none';
}
function getInputs(){
  return{
    token:document.getElementById('token').value.trim(),
    workflowRepo:document.getElementById('workflowRepo').value.trim(),
    file:document.getElementById('zipFile').files[0],
    appName:document.getElementById('appName').value.trim()||'my-app'
  };
}
async function uploadToRelease(token,owner,repo,file,appName){
  const tag=`build-${appName}-${Date.now()}`;const filePath=`uploads/${tag}.zip`;
  setStatus('📦 Encoding ZIP...','info');setProgress(15);
  const arrayBuffer=await file.arrayBuffer();const bytes=new Uint8Array(arrayBuffer);
  let binary='';const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk)binary+=String.fromCharCode(...bytes.subarray(i,i+chunk));
  const base64Content=btoa(binary);
  setStatus('⬆️ Upload ke GitHub...','info');setProgress(30);
  let sha;
  const checkRes=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`,
    {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
  if(checkRes.ok)sha=(await checkRes.json()).sha;
  const body={message:`Upload ${file.name}`,content:base64Content};if(sha)body.sha=sha;
  const uploadRes=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`,{
    method:'PUT',
    headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!uploadRes.ok){const err=await uploadRes.json().catch(()=>({}));throw new Error('Upload gagal: '+(err.message||uploadRes.status));}
  const asset=await uploadRes.json();setProgress(48);
  return{zipUrl:asset.content.download_url};
}
async function triggerWorkflow(token,owner,repo,zipUrl,appName){
  setStatus('🚀 Memicu GitHub Actions...','info');setProgress(55);
  const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/dispatches`,{
    method:'POST',
    headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
    body:JSON.stringify({event_type:'build-apk',client_payload:{zip_url:zipUrl,app_name:appName}})
  });
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error('Trigger gagal: '+(err.message||res.status));}
}
async function waitForRunId(token,owner,repo){
  setStatus('⏳ Menunggu workflow...','info');setProgress(65);
  for(let i=0;i<22;i++){
    await sleep(4500);
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?event=repository_dispatch&per_page=1`,
      {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
    const data=await res.json();
    if(data.workflow_runs?.length>0)return data.workflow_runs[0].id;
  }
  throw new Error('Timeout: Actions tidak merespon (100s)');
}
async function waitForBuild(token,owner,repo,rid){
  setStatus('🔨 Compile APK...','info');setProgress(72);
  for(let i=0;i<55;i++){
    await sleep(9000);
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs/${rid}`,
      {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
    const run=await res.json();
    setStatus(`🔧 ${run.status||'pending'} ${run.conclusion?'· '+run.conclusion:'· building...'}`, 'info');
    setProgress(72+Math.min(i,22));
    if(run.status==='completed'){
      if(run.conclusion!=='success')throw new Error('Build gagal: '+run.conclusion);
      return true;
    }
  }
  throw new Error('Timeout: Build > 8 menit');
}
async function getArtifactUrl(token,owner,repo,rid){
  setStatus('📥 Ambil link download...','info');setProgress(95);
  for(let i=0;i<12;i++){
    await sleep(4000);
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/apk-result.json`,
      {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'},cache:'no-store'});
    if(!res.ok)continue;
    const data=await res.json();
    const content=JSON.parse(atob(data.content.replace(/\n/g,'')));
    if(String(content.run_id)===String(rid)&&content.url)return content.url;
  }
  throw new Error('Link APK tidak ditemukan');
}
async function startBuild(){
  const{token,workflowRepo,file,appName}=getInputs();
  if(!token)return setStatus('❌ Masukkan GitHub Token!','error');
  if(!workflowRepo||!workflowRepo.includes('/'))return setStatus('❌ Format: "username/repo"','error');
  if(!file)return setStatus('❌ Pilih file ZIP project!','error');
  const[owner,repo]=workflowRepo.split('/');
  const buildBtn=document.getElementById('btnBuild');
  const downloadBtn=document.getElementById('btnDownload');
  buildBtn.disabled=true;downloadBtn.disabled=true;
  setLoading(true);setProgress(8);runId=null;artifactUrl=null;
  try{
    const{zipUrl}=await uploadToRelease(token,owner,repo,file,appName);
    await triggerWorkflow(token,owner,repo,zipUrl,appName);
    runId=await waitForRunId(token,owner,repo);
    await waitForBuild(token,owner,repo,runId);
    artifactUrl=await getArtifactUrl(token,owner,repo,runId);
    setProgress(100);
    setStatus('✅ APK siap! Klik Download.','success');
    downloadBtn.disabled=false;
  }catch(err){
    setStatus('❌ '+err.message,'error');setProgress(0);
  }finally{
    setLoading(false);buildBtn.disabled=false;
  }
}
function downloadApk(){
  if(!artifactUrl)return setStatus('⚠️ Build dulu sebelum download.','error');
  const a=document.createElement('a');
  a.href=artifactUrl;a.download='';a.target='_blank';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setStatus('📲 Download dimulai!','success');
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
