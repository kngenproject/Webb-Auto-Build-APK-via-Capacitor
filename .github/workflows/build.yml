name: Build APK from uploaded ZIP

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download project ZIP
      run: |
        ZIP_URL="${{ github.event.client_payload.zip_url }}"
        APP_NAME="${{ github.event.client_payload.app_name }}"
        echo "ZIP_URL=${ZIP_URL}" >> $GITHUB_ENV
        echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
        echo "Downloading ZIP dari: $ZIP_URL"
        curl -L \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "${ZIP_URL}" -o project.zip
        unzip -o project.zip -d ./project
        rsync -av ./project/ ./ --remove-source-files
        rm -rf project project.zip
        echo "✅ Project berhasil diekstrak"
        ls -la

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708

    - name: Install dependencies
      run: |
        npm ci || npm install
        npm install -g @capacitor/cli
        npm install @capacitor/android

    - name: Build web app
      run: |
        if npm run | grep -q " build"; then
          npm run build
        else
          echo "Tidak ada script build, skip"
        fi

    - name: Cek capacitor.config.json
      run: |
        if [ ! -f capacitor.config.json ]; then
          echo "❌ capacitor.config.json tidak ditemukan!"
          exit 1
        fi
        echo "✅ capacitor.config.json ditemukan:"
        cat capacitor.config.json

    - name: Add & Sync Capacitor Android
      run: |
        npx cap add android
        npx cap sync android

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload ke transfer.sh
      id: transfer
      run: |
        APK_PATH=$(find android/app/build/outputs/apk/debug/ -name "*.apk" | head -1)
        APK_NAME="${{ env.APP_NAME }}-${{ github.run_id }}.apk"
        echo "📤 Mengupload APK ke transfer.sh..."
        DOWNLOAD_URL=$(curl -s --upload-file "$APK_PATH" "https://transfer.sh/${APK_NAME}")
        echo "download_url=${DOWNLOAD_URL}" >> $GITHUB_OUTPUT
        echo "=========================================="
        echo "✅ APK SIAP DIDOWNLOAD!"
        echo "🔗 Link: ${DOWNLOAD_URL}"
        echo "⏳ Link berlaku 14 hari"
        echo "=========================================="

    - name: Simpan link ke apk-result.json
      run: |
        DOWNLOAD_URL="${{ steps.transfer.outputs.download_url }}"
        RUN_ID="${{ github.run_id }}"
        APP_NAME="${{ env.APP_NAME }}"
        echo "{\"url\":\"${DOWNLOAD_URL}\",\"run_id\":\"${RUN_ID}\",\"app\":\"${APP_NAME}\",\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > apk-result.json
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add apk-result.json
        git commit -m "APK result: ${APP_NAME} run ${RUN_ID}"
        git push

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk-${{ env.APP_NAME }}-${{ github.run_id }}
        path: android/app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
        retention-days: 7
