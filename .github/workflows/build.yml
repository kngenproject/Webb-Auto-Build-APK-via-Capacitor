name: Build APK from uploaded ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code (only for existing repo content)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get client payload
      id: payload
      run: |
        ZIP_URL="${{ github.event.client_payload.zip_url }}"
        REPO_FULL="${{ github.event.client_payload.repo }}"
        echo "ZIP_URL=${ZIP_URL}" >> $GITHUB_ENV
        echo "REPO_FULL=${REPO_FULL}" >> $GITHUB_ENV
        if [ -z "$ZIP_URL" ]; then
          echo "No zip_url provided, using existing files (if any)"
        fi
    
    - name: Download and extract project ZIP
      if: env.ZIP_URL != ''
      run: |
        echo "Downloading from $ZIP_URL"
        curl -L "$ZIP_URL" -o project.zip
        unzip -o project.zip -d ./project
        # Pindahkan isi project ke root (overwrite jika ada)
        rsync -av ./project/ ./ --remove-source-files
        rm -rf project project.zip
        echo "Extracted project files"
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
    
    - name: Install dependencies
      run: |
        npm ci || npm install
        npm install -g @capacitor/cli
    
    - name: Build web app (if build script exists)
      run: |
        if npm run | grep -q " build"; then
          npm run build
        else
          echo "No build script found, using current files as web root"
        fi
    
    - name: Sync Capacitor
      run: |
        if [ -f capacitor.config.json ]; then
          npx cap sync android
        else
          echo "capacitor.config.json not found!"
          exit 1
        fi
    
    - name: Build APK
      run: |
        if [ -d android ]; then
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "Android folder not found after sync"
          exit 1
        fi
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk-${{ github.run_id }}
        path: |
          android/app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
        retention-days: 7