name: Build APK

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download & extract ZIP project
        run: |
          curl -L "${{ github.event.client_payload.zip_url }}" -o project.zip
          unzip -o project.zip -d project/
          cd project && npm install && npm run build

      - name: Install Capacitor & add Android
        run: |
          cd project
          npx cap add android
          npx cap sync android

      - name: Ganti ikon kustom (jika ada res/icon.png)
        run: |
          if [ -f "project/res/icon.png" ]; then
            echo "✅ Ikon kustom ditemukan, mengganti..."
            sudo apt-get install -y imagemagick -q

            RES=project/android/app/src/main/res
            SRC=project/res/icon.png

            mkdir -p $RES/mipmap-mdpi $RES/mipmap-hdpi $RES/mipmap-xhdpi \
                     $RES/mipmap-xxhdpi $RES/mipmap-xxxhdpi

            convert "$SRC" -resize 48x48   $RES/mipmap-mdpi/ic_launcher.png
            convert "$SRC" -resize 72x72   $RES/mipmap-hdpi/ic_launcher.png
            convert "$SRC" -resize 96x96   $RES/mipmap-xhdpi/ic_launcher.png
            convert "$SRC" -resize 144x144 $RES/mipmap-xxhdpi/ic_launcher.png
            convert "$SRC" -resize 192x192 $RES/mipmap-xxxhdpi/ic_launcher.png

            for DPI in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              cp $RES/mipmap-$DPI/ic_launcher.png $RES/mipmap-$DPI/ic_launcher_round.png
              # Hapus .webp bawaan Capacitor agar tidak konflik
              rm -f $RES/mipmap-$DPI/ic_launcher.webp $RES/mipmap-$DPI/ic_launcher_round.webp
            done

            echo "✅ Ikon berhasil diganti!"
          else
            echo "ℹ️ Tidak ada ikon kustom, pakai default Capacitor"
          fi

      - name: Build debug APK
        run: |
          cd project/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: project/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Simpan link APK ke apk-result.json
        run: |
          RUN_ID=${{ github.run_id }}
          REPO=${{ github.repository }}
          URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"

          JSON="{\"run_id\":\"${RUN_ID}\",\"url\":\"${URL}\"}"
          ENCODED=$(echo -n "$JSON" | base64 -w 0)

          SHA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/contents/apk-result.json" | jq -r '.sha // empty')

          PAYLOAD="{\"message\":\"Update apk-result.json\",\"content\":\"${ENCODED}\""
          if [ -n "$SHA" ]; then PAYLOAD="${PAYLOAD},\"sha\":\"${SHA}\""; fi
          PAYLOAD="${PAYLOAD}}"

          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/contents/apk-result.json" \
            -d "$PAYLOAD"
