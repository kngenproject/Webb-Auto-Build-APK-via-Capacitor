name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
    
    - name: Install dependencies
      run: |
        npm ci || npm install
        npm install -g @capacitor/cli
    
    - name: Build web app
      run: |
        # Cek apakah ada script build
        if npm run | grep -q " build"; then
          npm run build
        else
          echo "No build script found, using current files"
        fi
    
    - name: Sync Capacitor
      run: |
        # Cek apakah sudah ada config capacitor
        if [ -f capacitor.config.json ]; then
          npx cap sync android
        else
          echo "capacitor.config.json not found"
          exit 1
        fi
    
    - name: Build APK
      run: |
        if [ -d android ]; then
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "Android folder not found after sync"
          exit 1
        fi
    
    - name: List APK files
      run: |
        find . -name "*.apk" -ls
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          android/app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
        compression-level: 0
        retention-days: 7
    
    - name: Upload APK (alternative path)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: apk-files
        path: "**/*.apk"
        if-no-files-found: warn
        retention-days: 7
